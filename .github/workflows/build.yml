name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install JS dependencies
        run: pnpm install

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            emulator/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/emulator/Cargo.lock') }}
      - name: Set up wasm-pack
        run: cargo install wasm-pack

      - name: Run emulator tests
        run: cargo test --manifest-path ./emulator/Cargo.toml

      - name: Run linter
        run: pnpm lint

      - name: Build production artifact
        run: pnpm build:prod
